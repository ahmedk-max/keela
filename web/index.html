<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"
    />
    <meta name="theme-color" content="#ECE5D6" />
    <!-- Apply the saved theme BEFORE first paint. In an installed iOS PWA the
         status-bar band (status-bar-style: default) is painted from theme-color,
         which iOS reads at launch — before React mounts. Without this, dark mode
         launches with a light status-bar band. Also kills the light load flash. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('keela.theme') || 'light';
          document.documentElement.setAttribute('data-theme', t);
          var m = document.querySelector('meta[name="theme-color"]');
          if (m) m.setAttribute('content', t === 'dark' ? '#16120F' : '#ECE5D6');
        } catch (e) {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,500&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <!-- `default` (not black-translucent): in an installed iOS PWA, black-translucent
         can make env(safe-area-inset-*) report 0, so the home-indicator inset is lost
         and bottom content (tab bar, sheet buttons) gets clipped. `default` restores
         proper safe-area insets — matching the Wirehouse shell, where they work. -->
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Keela" />
    <title>Keela</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
